version: '3.7'

services:
  # Jenkins service (l'agent Jenkins dans ce conteneur)
  jenkins:
    image: jenkins/jenkins:lts
    ports:
      - "8080:8080"  # Jenkins UI
      - "50000:50000"  # Jenkins agent communication
    volumes:
      - jenkins_home:/var/jenkins_home
    environment:
      - JENKINS_OPTS=--prefix=/jenkins
    networks:
      - devsecops-network

  # SonarQube service
  sonarqube:
    image: sonarqube:latest
    ports:
      - "9000:9000"  # SonarQube UI
    environment:
      - SONARQUBE_JDBC_URL=jdbc:postgresql://postgres:5432/sonar  # Connexion à la base de données PostgreSQL
    depends_on:
      - postgres  # Dépendance sur le service PostgreSQL
    networks:
      - devsecops-network

  # PostgreSQL service for SonarQube
  postgres:
    image: postgres:latest
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=sonar
      - POSTGRES_DB=sonar
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - devsecops-network

  # Trivy service
  trivy:
    image: aquasec/trivy:0.22.0  # Utiliser une version stable de Trivy
    networks:
      - devsecops-network

  # Gitleaks service
  gitleaks:
    image: zricethezav/gitleaks:latest
    networks:
      - devsecops-network

volumes:
  jenkins_home:
  postgres_data:

networks:
  devsecops-network:
    driver: bridge