version: '3.7'

services:
  # Jenkins service (l'agent Jenkins dans ce conteneur)
  jenkins:
    image: jenkins/jenkins:lts
    ports:
      - "8080:8080"  # Jenkins UI
      - "50000:50000"  # Jenkins agent communication
    volumes:
      - jenkins_home:/var/jenkins_home
    environment:
      - JENKINS_OPTS=--prefix=/jenkins
    networks:
      - devsecops-network

  # SonarQube service
  sonarqube:
    image: sonarqube:latest
    ports:
      - "9000:9000"  # SonarQube UI
    environment:
      - SONARQUBE_JDBC_URL=jdbc:postgresql://db:5432/sonar
    networks:
      - devsecops-network

  # Trivy service
  trivy:
    image: aquasec/trivy:latest
    networks:
      - devsecops-network

  # Gitleaks service
  gitleaks:
    image: zricethezav/gitleaks:latest
    networks:
      - devsecops-network

volumes:
  jenkins_home:
  
networks:
  devsecops-network:
    driver: bridge