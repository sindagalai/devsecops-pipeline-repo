title = "Default generic Gitleaks rules for enterprise scanning"

[allowlist]
description = "Global allowlist for noisy generic paths"
paths = [
  '''(^|/)\.git/''',
  '''(^|/)node_modules/''',
  '''(^|/)target/''',
  '''(^|/)dist/''',
  '''(^|/)build/''',
  '''(^|/)coverage/''',
  '''(^|/)vendor/''',
  '''(^|/)\.idea/''',
  '''(^|/)\.vscode/''',
  '''(^|/)out/''',
  '''(^|/)bin/''',
  '''(^|/)obj/'''
]

[[rules]]
id = "hardcoded-password"
description = "Detect hardcoded password values"
regex = '''(?i)(password|passwd|pwd|db_password|database_password)\s*[:=]\s*["'][^"'\s]{8,}["']'''
tags = ["password", "high-confidence"]

[[rules]]
id = "hardcoded-secret"
description = "Detect hardcoded secret values"
regex = '''(?i)(secret|secret_key|client_secret|app_secret|jwt_secret|auth_secret)\s*[:=]\s*["'][A-Za-z0-9_\-+/=]{12,}["']'''
tags = ["secret", "high-confidence"]

[[rules]]
id = "hardcoded-token"
description = "Detect hardcoded token values"
regex = '''(?i)(token|access_token|refresh_token|id_token|auth_token)\s*[:=]\s*["'][A-Za-z0-9\-._~+/=]{12,}["']'''
tags = ["token", "high-confidence"]

[[rules]]
id = "api-key"
description = "Detect API key values"
regex = '''(?i)(api[_-]?key|apikey|client[_-]?key|access[_-]?key)\s*[:=]\s*["'][A-Za-z0-9_\-]{12,}["']'''
tags = ["apikey", "high-confidence"]

[[rules]]
id = "bearer-token"
description = "Detect hardcoded bearer tokens"
regex = '''(?i)bearer\s+[A-Za-z0-9\-._~+/=]{20,}'''
tags = ["bearer", "high-confidence"]

[[rules]]
id = "private-key"
description = "Detect private key blocks"
regex = '''-----BEGIN (RSA|DSA|EC|OPENSSH|PGP|PRIVATE KEY).*-----'''
tags = ["private-key", "critical"]

[[rules]]
id = "config-sensitive-value"
description = "Detect sensitive values in config files"
path = '''(?i)\.(ya?ml|json|properties|env|conf|ini)$'''
regex = '''(?i)(secret|token|password|passwd|api[_-]?key|client[_-]?secret|access[_-]?key)\s*[:=]\s*["']?[A-Za-z0-9_\-+/=]{12,}["']?'''
tags = ["config", "high-confidence"]